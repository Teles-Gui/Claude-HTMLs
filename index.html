<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de Calorias — Cardápio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f3;
  --bg-tertiary: #eeede9;
  --text-primary: #1a1a18;
  --text-secondary: #73726c;
  --border-soft: rgba(0,0,0,0.10);
  --border-mid: rgba(0,0,0,0.20);
  --border-strong: rgba(0,0,0,0.30);
  --radius-md: 8px;
  --radius-lg: 12px;
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --green-dark: #085041;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --amber-dark: #633806;
  --gray-light: #F1EFE8;
  --gray-dark: #444441;
  --blue: #378ADD;
  --red: #A32D2D;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1c1c1a;
    --bg-secondary: #252523;
    --bg-tertiary: #2e2e2b;
    --text-primary: #f0ede6;
    --text-secondary: #9e9d97;
    --border-soft: rgba(255,255,255,0.09);
    --border-mid: rgba(255,255,255,0.16);
    --border-strong: rgba(255,255,255,0.26);
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
  display: flex;
  justify-content: center;
}
.container { width: 100%; max-width: 680px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.header h1 { font-size: 17px; font-weight: 500; }
.save-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 20px;
  border: 0.5px solid var(--border-mid);
  background: var(--bg-primary); cursor: pointer;
  font-size: 12px; color: var(--text-secondary);
  transition: all 0.15s;
}
.save-btn:hover { border-color: var(--green); color: var(--green); }
.save-btn.saved { border-color: var(--green); color: var(--green); background: var(--green-light); }
.save-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

.profile-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.tab { padding: 6px 18px; border-radius: 20px; border: 0.5px solid var(--border-mid); background: transparent; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all 0.15s; }
.tab.active { background: var(--bg-secondary); color: var(--text-primary); font-weight: 500; border-color: var(--border-strong); }

.day-selector { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.day-btn { padding: 5px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-soft); background: transparent; cursor: pointer; font-size: 12px; color: var(--text-secondary); }
.day-btn.active { border-color: transparent; font-weight: 500; }
.day-btn.treino.active { background: var(--green-light); color: var(--green-dark); }
.day-btn.flex.active { background: var(--amber-light); color: var(--amber-dark); }
.day-btn.off.active { background: var(--gray-light); color: var(--gray-dark); }

.meta-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.meta-card { flex: 1; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 14px; text-align: center; }
.meta-label { font-size: 11px; color: var(--text-secondary); margin: 0 0 4px; }
.meta-val { font-size: 20px; font-weight: 500; color: var(--text-primary); margin: 0; }
.meta-sub { font-size: 11px; color: var(--text-secondary); margin: 2px 0 0; }

.total-bar-wrap { margin-bottom: 1.5rem; }
.bar-bg { background: var(--bg-secondary); border-radius: 6px; height: 10px; overflow: hidden; margin: 8px 0 4px; }
.bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s, background 0.4s; }
.bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

.macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.macro-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; }
.macro-label { font-size: 11px; color: var(--text-secondary); margin: 0 0 4px; }
.macro-val { font-size: 16px; font-weight: 500; margin: 0; }

.section-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 10px; }

.meals { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.meal-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg-secondary); border-radius: var(--radius-md); cursor: pointer; transition: opacity 0.2s; }
.meal-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin: 0 0 2px; }
.meal-desc { font-size: 12px; color: var(--text-secondary); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-kcal { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; }

.add-section { background: var(--bg-primary); border: 0.5px solid var(--border-soft); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
.add-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
.add-tab { flex: 1; padding: 7px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-soft); background: transparent; cursor: pointer; font-size: 12px; color: var(--text-secondary); text-align: center; transition: all 0.15s; }
.add-tab.active { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--border-mid); font-weight: 500; }
.add-panel { display: none; }
.add-panel.active { display: block; }

.input-row { display: flex; gap: 8px; flex-wrap: wrap; }
.cal-input {
  flex: 1; min-width: 80px; padding: 8px 12px; border-radius: var(--radius-md);
  border: 0.5px solid var(--border-mid); background: var(--bg-secondary);
  font-size: 13px; color: var(--text-primary); outline: none;
}
.cal-input:focus { border-color: var(--green); }
.action-btn {
  padding: 8px 16px; border-radius: var(--radius-md);
  border: 0.5px solid var(--border-mid); background: var(--bg-secondary);
  font-size: 13px; cursor: pointer; color: var(--text-primary);
  white-space: nowrap; transition: all 0.15s;
}
.action-btn:hover { opacity: 0.8; }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.action-btn.primary { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 500; }

.photo-drop {
  border: 1.5px dashed var(--border-mid); border-radius: var(--radius-md);
  padding: 1.5rem; text-align: center; cursor: pointer;
  transition: all 0.15s; margin-bottom: 10px;
}
.photo-drop:hover, .photo-drop.dragover { border-color: var(--green); background: var(--green-light); }
.photo-drop p { font-size: 13px; color: var(--text-secondary); margin: 6px 0 0; }
.photo-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 10px; display: none; }
#photo-input { display: none; }

.desc-textarea {
  width: 100%; padding: 10px 12px; border-radius: var(--radius-md);
  border: 0.5px solid var(--border-mid); background: var(--bg-secondary);
  font-size: 13px; color: var(--text-primary); resize: none;
  height: 72px; font-family: inherit; outline: none; margin-bottom: 10px;
}
.desc-textarea:focus { border-color: var(--green); }

.ai-result {
  background: var(--green-light); border-radius: var(--radius-md);
  padding: 10px 14px; margin-top: 10px; display: none;
  border: 0.5px solid rgba(29,158,117,0.3);
}
.ai-result p { font-size: 13px; color: var(--green-dark); margin: 0; }

.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--border-mid); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }

.extra-items { display: flex; flex-direction: column; gap: 6px; }
.extra-item {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--text-secondary); padding: 8px 12px;
  background: var(--bg-secondary); border-radius: var(--radius-md);
}
.extra-item-left { display: flex; flex-direction: column; gap: 2px; }
.extra-source-badge { font-size: 10px; color: var(--text-secondary); opacity: 0.7; }
.rm-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 0 4px; opacity: 0.5; }
.rm-btn:hover { opacity: 1; }

.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text-primary); color: var(--bg-primary);
  padding: 10px 20px; border-radius: 20px; font-size: 13px;
  opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<div class="container">
  <div class="header">
    <h1>Tracker de Calorias</h1>
    <button class="save-btn" onclick="saveState()" id="save-btn">
      <span class="save-dot"></span> Salvar
    </button>
  </div>

  <div class="profile-tabs">
    <button class="tab active" onclick="setProfile('g')">Guilherme</button>

  </div>

  <div class="day-selector" id="day-selector"></div>

  <div class="meta-row">
    <div class="meta-card">
      <p class="meta-label">Meta do dia</p>
      <p class="meta-val" id="meta-goal">—</p>
      <p class="meta-sub" id="meta-type">—</p>
    </div>
    <div class="meta-card">
      <p class="meta-label">Consumido</p>
      <p class="meta-val" id="meta-consumed">0</p>
      <p class="meta-sub">kcal</p>
    </div>
    <div class="meta-card">
      <p class="meta-label">Saldo</p>
      <p class="meta-val" id="meta-balance">—</p>
      <p class="meta-sub" id="meta-balance-label">restante</p>
    </div>
  </div>

  <div class="total-bar-wrap">
    <div class="bar-bg"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    <div class="bar-labels"><span>0</span><span id="bar-goal-label">—</span></div>
  </div>

  <div class="macro-grid">
    <div class="macro-card"><p class="macro-label">Proteína</p><p class="macro-val" id="m-prot" style="color:#378ADD">—</p></div>
    <div class="macro-card"><p class="macro-label">Carboidrato</p><p class="macro-val" id="m-carb" style="color:#BA7517">—</p></div>
    <div class="macro-card"><p class="macro-label">Gordura</p><p class="macro-val" id="m-fat" style="color:#1D9E75">—</p></div>
  </div>

  <p class="section-title">Refeições do dia</p>
  <div class="meals" id="meals-list"></div>

  <p class="section-title">Adicionar ao dia</p>
  <div class="add-section">
    <div class="add-tabs">
      <button class="add-tab active" onclick="switchAddTab('manual')">✏️ Calorias</button>
      <button class="add-tab" onclick="switchAddTab('photo')">📷 Foto</button>
      <button class="add-tab" onclick="switchAddTab('desc')">💬 Descrição</button>
    </div>

    <div class="add-panel active" id="panel-manual">
      <div class="input-row">
        <input class="cal-input" type="number" id="manual-kcal" placeholder="kcal" min="0" style="max-width:90px">
        <input class="cal-input" type="text" id="manual-label" placeholder="Descrição (ex: sorvete, pizza...)">
        <button class="action-btn primary" onclick="addManual()">+ Adicionar</button>
      </div>
    </div>

    <div class="add-panel" id="panel-photo">
      <div class="photo-drop" id="photo-drop" onclick="document.getElementById('photo-input').click()" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
        <div style="font-size:28px">📷</div>
        <p>Clique para enviar uma foto ou arraste aqui</p>
        <p style="font-size:11px;margin-top:4px;opacity:0.6">JPG, PNG, WEBP</p>
      </div>
      <input type="file" id="photo-input" accept="image/*" onchange="handlePhotoSelect(event)">
      <img id="photo-preview" class="photo-preview" alt="Preview da refeição">
      <div class="input-row" style="margin-bottom:0">
        <input class="cal-input" type="text" id="photo-label" placeholder="Nome do prato (opcional)">
        <button class="action-btn primary" id="photo-analyze-btn" onclick="analyzePhoto()" disabled>Analisar →</button>
      </div>
      <div class="ai-result" id="photo-result"></div>
    </div>

    <div class="add-panel" id="panel-desc">
      <textarea class="desc-textarea" id="desc-text" placeholder="Ex: frango grelhado 150g com arroz integral e salada de folhas com azeite..."></textarea>
      <div class="input-row">
        <input class="cal-input" type="text" id="desc-label" placeholder="Nome do prato (opcional)">
        <button class="action-btn primary" id="desc-analyze-btn" onclick="analyzeDesc()">Calcular →</button>
      </div>
      <div class="ai-result" id="desc-result"></div>
    </div>
  </div>

  <div class="extra-items" id="extra-items"></div>
</div>

<div class="toast" id="toast"></div>

        { name: 'Lanche manhã', desc: '1 banana', kcal: 90, prot: 1, carb: 22, fat: 0 },
        { name: 'Almoço', desc: 'Coxão mole/patinho (130g) + feijão + arroz + salada', kcal: 410, prot: 36, carb: 38, fat: 12 },
        { name: 'Lanche tarde', desc: '1 fruta', kcal: 70, prot: 1, carb: 18, fat: 0 },
        { name: 'Jantar', desc: 'Pernil fatiado (120g) + chuchu refogado + ovo cozido', kcal: 290, prot: 30, carb: 10, fat: 12 },
      ]},
      'Sáb': { type: 'flex', goal: 1700, label: 'Dia flex', meals: [
        { name: 'Café da manhã', desc: 'Omelete (2 ovos) + tapioca recheada + café', kcal: 310, prot: 18, carb: 32, fat: 12 },
        { name: 'Lanche manhã', desc: 'Fruta + iogurte s/ lactose', kcal: 160, prot: 7, carb: 24, fat: 4 },
        { name: 'Almoço', desc: 'Refeição livre — churrasco/costelinha', kcal: 520, prot: 36, carb: 14, fat: 30 },
        { name: 'Lanche tarde', desc: 'Fruta à vontade', kcal: 100, prot: 1, carb: 26, fat: 0 },
        { name: 'Jantar', desc: 'Alcatra (120g) ou frango assado + salada', kcal: 290, prot: 30, carb: 8, fat: 12 },
      ]},
      'Dom': { type: 'off', goal: 1500, label: 'Descanso', meals: [
        { name: 'Café da manhã', desc: 'Omelete (2 ovos) + tapioca mini + café', kcal: 240, prot: 14, carb: 20, fat: 10 },
        { name: 'Lanche manhã', desc: 'Fruta da estação', kcal: 70, prot: 1, carb: 18, fat: 0 },
        { name: 'Almoço', desc: 'Frango assado (130g) + feijão + arroz + legumes + azeite', kcal: 430, prot: 38, carb: 40, fat: 14 },
        { name: 'Lanche tarde', desc: '1 fruta pequena', kcal: 60, prot: 1, carb: 15, fat: 0 },
        { name: 'Jantar', desc: 'Omelete (2 ovos) + salada + tapioca mini s/ queijo', kcal: 240, prot: 14, carb: 18, fat: 10 },
      ]},
    }
  }
};

const MEAL_ICONS = { 'Café da manhã':'🍳','Lanche manhã':'🍌','Almoço':'🍽️','Lanche tarde':'🍎','Jantar':'🌙','Pré-treino':'⚡' };
const DAY_KEYS = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const STORAGE_KEY = 'calorie_tracker_v2';

let currentProfile = 'g';
let currentDay = 'Seg';
let checkedMeals = {};
let extras = {};
let photoBase64 = null;

function key(p, d) { return p + '_' + d; }

// ---- PERSIST ----
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentProfile, currentDay, checkedMeals, extras }));
    const btn = document.getElementById('save-btn');
    btn.classList.add('saved');
    btn.innerHTML = '<span class="save-dot"></span> Salvo ✓';
    showToast('Estado salvo!');
    setTimeout(() => { btn.classList.remove('saved'); btn.innerHTML = '<span class="save-dot"></span> Salvar'; }, 2500);
  } catch(e) { showToast('Erro ao salvar.'); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.currentProfile) currentProfile = s.currentProfile;
    if (s.currentDay) currentDay = s.currentDay;
    if (s.checkedMeals) checkedMeals = s.checkedMeals;
    if (s.extras) extras = s.extras;
  } catch(e) {}
}

// ---- TABS ----
function switchAddTab(tab) {
  document.querySelectorAll('.add-tab').forEach((t,i) => t.classList.toggle('active', ['manual','photo','desc'][i] === tab));
  document.querySelectorAll('.add-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ---- PROFILE / DAY ----
function setProfile(p) {
  currentProfile = p;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&p==='g')||(i===1&&p==='s')));
  renderAll();
}

function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-btn').forEach(b => {
    const isActive = b.dataset.day === d;
    const type = PROFILES_DATA[currentProfile].days[d].type;
    b.className = 'day-btn' + (isActive ? ' active ' + type : '');
  });
  renderMeals(); renderSummary(); renderExtraItems();
}

function toggleMeal(idx) {
  const k = key(currentProfile, currentDay);
  if (!checkedMeals[k]) checkedMeals[k] = {};
  checkedMeals[k][idx] = !checkedMeals[k][idx];
  renderMeals(); renderSummary();
}

// ---- MANUAL ----
function addManual() {
  const cal = parseInt(document.getElementById('manual-kcal').value);
  const label = document.getElementById('manual-label').value.trim() || 'Extra';
  if (!cal || cal <= 0) { showToast('Insira um valor válido.'); return; }
  pushExtra({ label, kcal: cal, prot: 0, carb: 0, fat: 0, source: 'manual' });
  document.getElementById('manual-kcal').value = '';
  document.getElementById('manual-label').value = '';
}

function pushExtra(item) {
  const k = key(currentProfile, currentDay);
  if (!extras[k]) extras[k] = [];
  extras[k].push(item);
  renderSummary(); renderExtraItems();
}

function removeExtra(idx) {
  const k = key(currentProfile, currentDay);
  extras[k].splice(idx, 1);
  renderSummary(); renderExtraItems();
}

// ---- PHOTO ----
function handleDragOver(e) { e.preventDefault(); document.getElementById('photo-drop').classList.add('dragover'); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('photo-drop').classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadPhoto(f);
}
function handlePhotoSelect(e) { const f = e.target.files[0]; if (f) loadPhoto(f); }

function loadPhoto(file) {
  const reader = new FileReader();
  reader.onload = e => {
    photoBase64 = e.target.result.split(',')[1];
    const preview = document.getElementById('photo-preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById('photo-drop').style.display = 'none';
    document.getElementById('photo-analyze-btn').disabled = false;
    document.getElementById('photo-result').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function analyzePhoto() {
  if (!photoBase64) return;
  const label = document.getElementById('photo-label').value.trim() || 'Refeição';
  const btn = document.getElementById('photo-analyze-btn');
  const resultDiv = document.getElementById('photo-result');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analisando...';
  resultDiv.style.display = 'none';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: photoBase64 } },
          { type: 'text', text: 'Analise esta imagem de uma refeição e estime as calorias e macronutrientes. Responda APENAS em JSON válido sem texto adicional: {"kcal": número, "prot": número, "carb": número, "fat": número, "descricao": "descrição breve dos alimentos identificados"}. Todos os valores devem ser números inteiros. Seja conservador e realista.' }
        ]}]
      })
    });
    const data = await res.json();
    const text = data.content.find(b => b.type === 'text')?.text || '';
    const p = JSON.parse(text.replace(/```json|```/g,'').trim());
    resultDiv.innerHTML = `<p><strong>${p.kcal} kcal</strong> estimadas &nbsp;·&nbsp; ${p.prot}g prot &nbsp;·&nbsp; ${p.carb}g carb &nbsp;·&nbsp; ${p.fat}g fat<br><span style="font-size:11px;opacity:0.75;display:block;margin-top:4px">${p.descricao}</span></p><button class="action-btn primary" style="margin-top:10px;width:100%" onclick="confirmAI('photo',\`${label.replace(/`/g,'')}\`,${p.kcal},${p.prot},${p.carb},${p.fat})">+ Adicionar ao dia</button>`;
    resultDiv.style.display = 'block';
  } catch(e) {
    resultDiv.innerHTML = '<p>Erro ao analisar. Tente novamente.</p>';
    resultDiv.style.display = 'block';
  }
  btn.disabled = false;
  btn.innerHTML = 'Analisar →';
}

// ---- DESCRIPTION ----
async function analyzeDesc() {
  const text = document.getElementById('desc-text').value.trim();
  if (!text) { showToast('Descreva a refeição primeiro.'); return; }
  const label = document.getElementById('desc-label').value.trim() || text.slice(0,35);
  const btn = document.getElementById('desc-analyze-btn');
  const resultDiv = document.getElementById('desc-result');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Calculando...';
  resultDiv.style.display = 'none';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `Estime as calorias e macronutrientes da seguinte refeição: "${text}". Responda APENAS em JSON válido sem texto adicional: {"kcal": número, "prot": número, "carb": número, "fat": número, "notas": "observação rápida"}. Todos os valores devem ser números inteiros. Considere porções típicas brasileiras quando não especificadas.` }]
      })
    });
    const data = await res.json();
    const raw = data.content.find(b => b.type === 'text')?.text || '';
    const p = JSON.parse(raw.replace(/```json|```/g,'').trim());
    resultDiv.innerHTML = `<p><strong>${p.kcal} kcal</strong> estimadas &nbsp;·&nbsp; ${p.prot}g prot &nbsp;·&nbsp; ${p.carb}g carb &nbsp;·&nbsp; ${p.fat}g fat<br><span style="font-size:11px;opacity:0.75;display:block;margin-top:4px">${p.notas}</span></p><button class="action-btn primary" style="margin-top:10px;width:100%" onclick="confirmAI('desc',\`${label.replace(/`/g,'').replace(/'/g,"&#39;")}\`,${p.kcal},${p.prot},${p.carb},${p.fat})">+ Adicionar ao dia</button>`;
    resultDiv.style.display = 'block';
  } catch(e) {
    resultDiv.innerHTML = '<p>Erro ao calcular. Tente novamente.</p>';
    resultDiv.style.display = 'block';
  }
  btn.disabled = false;
  btn.innerHTML = 'Calcular →';
}

function confirmAI(source, label, kcal, prot, carb, fat) {
  pushExtra({ label, kcal, prot, carb, fat, source });
  showToast(`${kcal} kcal adicionadas!`);
  if (source === 'photo') {
    photoBase64 = null;
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-drop').style.display = 'block';
    document.getElementById('photo-analyze-btn').disabled = true;
    document.getElementById('photo-result').style.display = 'none';
    document.getElementById('photo-label').value = '';
    document.getElementById('photo-input').value = '';
  } else {
    document.getElementById('desc-text').value = '';
    document.getElementById('desc-label').value = '';
    document.getElementById('desc-result').style.display = 'none';
  }
}

// ---- CONSUMED TOTALS ----
function getConsumed() {
  const k = key(currentProfile, currentDay);
  const meals = PROFILES_DATA[currentProfile].days[currentDay].meals;
  let total = 0, prot = 0, carb = 0, fat = 0;
  meals.forEach((m, i) => { if (checkedMeals[k]?.[i]) { total += m.kcal; prot += m.prot; carb += m.carb; fat += m.fat; } });
  (extras[k] || []).forEach(e => { total += e.kcal; prot += (e.prot||0); carb += (e.carb||0); fat += (e.fat||0); });
  return { total, prot, carb, fat };
}

// ---- RENDER ----
function renderDaySelector() {
  const c = document.getElementById('day-selector');
  c.innerHTML = '';
  DAY_KEYS.forEach(d => {
    const btn = document.createElement('button');
    const type = PROFILES_DATA[currentProfile].days[d].type;
    btn.className = 'day-btn' + (d === currentDay ? ' active ' + type : '');
    btn.dataset.day = d;
    btn.textContent = d;
    btn.onclick = () => setDay(d);
    c.appendChild(btn);
  });
}

function renderMeals() {
  const k = key(currentProfile, currentDay);
  const meals = PROFILES_DATA[currentProfile].days[currentDay].meals;
  const list = document.getElementById('meals-list');
  list.innerHTML = '';
  meals.forEach((m, i) => {
    const checked = checkedMeals[k]?.[i];
    const row = document.createElement('div');
    row.className = 'meal-row';
    row.style.opacity = checked ? '0.45' : '1';
    if (checked) row.style.textDecoration = 'line-through';
    row.onclick = () => toggleMeal(i);
    row.innerHTML = `<span class="meal-icon">${MEAL_ICONS[m.name]||'🍴'}</span><div class="meal-info"><p class="meal-name">${m.name}</p><p class="meal-desc">${m.desc}</p></div><span class="meal-kcal">${m.kcal} kcal</span>`;
    list.appendChild(row);
  });
}

function renderSummary() {
  const dayData = PROFILES_DATA[currentProfile].days[currentDay];
  const { total, prot, carb, fat } = getConsumed();
  const goal = dayData.goal;
  const balance = goal - total;
  const pct = Math.min(Math.round((total / goal) * 100), 100);
  document.getElementById('meta-goal').textContent = goal.toLocaleString('pt-BR');
  document.getElementById('meta-type').textContent = dayData.label;
  document.getElementById('meta-consumed').textContent = total.toLocaleString('pt-BR');
  document.getElementById('meta-balance').textContent = Math.abs(balance).toLocaleString('pt-BR');
  document.getElementById('meta-balance-label').textContent = balance >= 0 ? 'kcal restante' : 'kcal acima';
  document.getElementById('meta-balance').style.color = balance < 0 ? 'var(--red)' : 'var(--text-primary)';
  document.getElementById('bar-goal-label').textContent = goal.toLocaleString('pt-BR');
  const fill = document.getElementById('bar-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 100 ? 'var(--red)' : pct > 85 ? 'var(--amber)' : 'var(--green)';
  document.getElementById('m-prot').textContent = prot + 'g';
  document.getElementById('m-carb').textContent = carb + 'g';
  document.getElementById('m-fat').textContent = fat + 'g';
}

function renderExtraItems() {
  const k = key(currentProfile, currentDay);
  const list = document.getElementById('extra-items');
  list.innerHTML = '';
  const items = extras[k] || [];
  if (!items.length) return;
  const title = document.createElement('p');
  title.className = 'section-title';
  title.style.marginBottom = '10px';
  title.textContent = 'Extras adicionados';
  list.appendChild(title);
  const sourceLabel = { manual: '✏️ manual', photo: '📷 foto', desc: '💬 descrição' };
  items.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'extra-item';
    row.innerHTML = `<div class="extra-item-left"><span style="color:var(--text-primary);font-weight:500">${e.label}</span><span class="extra-source-badge">${sourceLabel[e.source]||''}</span></div><span style="display:flex;align-items:center;gap:8px"><span style="font-weight:500;color:var(--text-primary)">${e.kcal} kcal</span><button class="rm-btn" onclick="removeExtra(${i})">✕</button></span>`;
    list.appendChild(row);
  });
}

function renderAll() { renderDaySelector(); renderMeals(); renderSummary(); renderExtraItems(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---- INIT ----
loadState();
document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&currentProfile==='g')||(i===1&&currentProfile==='s')));
renderAll();
</script>
